<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Claude Token Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAFA;
    --surface: #FFFFFF;
    --surface-2: #F5F5F4;
    --border: #EAEAEA;
    --border-soft: #F0F0EF;
    --ink: #0A0A0A;
    --ink-2: #3A3A38;
    --muted: #6B6B6B;
    --muted-2: #9A9A97;
    --accent: #CC785C;
    --accent-soft: #F6E8E1;
    --danger: #C14E3F;
    --ok: #6B8E5A;

    --radius: 10px;
    --radius-sm: 6px;

    --pad: 20px;
    --gap: 16px;
    --row-h: 44px;
    --kpi-pad: 22px;
    --font-sm: 12px;
    --font-base: 13px;
    --font-lg: 14px;

    --shadow: 0 1px 0 rgba(10,10,10,0.02), 0 1px 2px rgba(10,10,10,0.03);
  }
  [data-density="airy"] {
    --pad: 28px;
    --gap: 22px;
    --row-h: 52px;
    --kpi-pad: 28px;
    --font-sm: 12px;
    --font-base: 13.5px;
    --font-lg: 14.5px;
  }
  [data-density="dense"] {
    --pad: 14px;
    --gap: 10px;
    --row-h: 36px;
    --kpi-pad: 14px;
    --font-sm: 11px;
    --font-base: 12px;
    --font-lg: 13px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: var(--font-base);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.005em;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-feature-settings: "tnum"; }

  /* ---------- Layout ---------- */
  .app {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 100vh;
  }
  [data-density="airy"] .app { grid-template-columns: 240px 1fr; }
  [data-density="dense"] .app { grid-template-columns: 196px 1fr; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 22px 14px;
    display: flex; flex-direction: column; gap: 22px;
    position: sticky; top: 0; height: 100vh;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 18px;
    border-bottom: 1px solid var(--border-soft);
  }
  .brand-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--ink);
    color: #fff;
    display: grid; place-items: center;
    font-weight: 700; font-size: 13px;
    letter-spacing: -0.02em;
  }
  .brand-mark .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .brand-name { font-weight: 600; font-size: 13.5px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .nav-group-label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted-2); padding: 0 8px; margin-bottom: 6px; font-weight: 600;
  }
  .nav { display: flex; flex-direction: column; gap: 1px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: var(--radius-sm);
    color: var(--ink-2); cursor: pointer;
    font-size: 13px; font-weight: 500;
    position: relative;
  }
  .nav-item:hover { background: var(--surface-2); }
  .nav-item.active { background: var(--surface-2); color: var(--ink); }
  .nav-item.active::before {
    content: ""; position: absolute; left: -14px; top: 8px; bottom: 8px;
    width: 2px; background: var(--accent); border-radius: 2px;
  }
  .nav-item .count {
    margin-left: auto; font-size: 11px; color: var(--muted);
    background: var(--surface-2); padding: 1px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
  }
  .nav-item.active .count { background: #fff; border: 1px solid var(--border); }

  .sidebar-footer {
    margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border-soft);
    display: flex; flex-direction: column; gap: 10px;
  }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px; color: var(--muted);
    padding: 6px 10px; background: var(--surface-2); border-radius: 6px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 2px rgba(107,142,90,0.18); }

  /* ---------- Topbar ---------- */
  .main { min-width: 0; }
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 18px var(--pad); border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
  }
  .title { font-size: 18px; font-weight: 600; letter-spacing: -0.015em; }
  .subtitle { font-size: 12px; color: var(--muted); }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .btn {
    height: 32px; padding: 0 12px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface);
    font: 500 12.5px 'Inter'; color: var(--ink-2);
    display: inline-flex; align-items: center; gap: 6px;
    cursor: pointer;
  }
  .btn:hover { background: var(--surface-2); }
  .btn.primary {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .btn.primary:hover { background: #222; }
  .segmented {
    display: inline-flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 2px; gap: 2px;
  }
  .segmented button {
    height: 26px; padding: 0 10px; border: 0; background: transparent;
    font: 500 12px 'Inter'; color: var(--muted); border-radius: 5px; cursor: pointer;
  }
  .segmented button.on { background: var(--ink); color: #fff; }

  /* ---------- Content ---------- */
  .content {
    padding: var(--pad);
    display: flex; flex-direction: column; gap: var(--gap);
  }

  .row { display: grid; gap: var(--gap); }
  .row.kpis { grid-template-columns: repeat(4, 1fr); }
  .row.split-2 { grid-template-columns: 1.7fr 1fr; }
  .row.split-3 { grid-template-columns: 1fr 1fr 1fr; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--pad);
  }
  .card.tight { padding: var(--kpi-pad); }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .card-title { font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
  .card-hint { font-size: 11.5px; color: var(--muted); }

  /* ---------- KPI ---------- */
  .kpi-label {
    font-size: 11px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.08em; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .kpi-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px; font-weight: 500; letter-spacing: -0.02em;
    margin-top: 10px; color: var(--ink);
  }
  .kpi-value .unit { font-size: 13px; color: var(--muted); margin-left: 2px; font-weight: 400; }
  .kpi-meta {
    margin-top: 8px; display: flex; align-items: center; gap: 8px;
    font-size: 11.5px; color: var(--muted);
  }
  .delta { display: inline-flex; align-items: center; gap: 3px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .delta.up { color: var(--accent); }
  .delta.down { color: var(--ok); }
  .spark { margin-top: 14px; height: 34px; width: 100%; }

  /* ---------- Chart ---------- */
  .chart-wrap { height: 240px; position: relative; }
  [data-density="airy"] .chart-wrap { height: 280px; }
  [data-density="dense"] .chart-wrap { height: 200px; }
  .legend {
    display: flex; gap: 14px; font-size: 11.5px; color: var(--muted);
  }
  .legend .sw { width: 8px; height: 8px; border-radius: 2px; display: inline-block; margin-right: 6px; vertical-align: middle; }

  /* ---------- Storage breakdown ---------- */
  .stack-bar {
    display: flex; height: 10px; border-radius: 5px; overflow: hidden;
    background: var(--surface-2); margin-bottom: 14px;
  }
  .stack-bar > div { height: 100%; }
  .storage-list { display: flex; flex-direction: column; }
  .storage-row {
    display: grid; grid-template-columns: 14px 1fr auto auto;
    gap: 10px; align-items: center;
    padding: 9px 0;
    border-top: 1px solid var(--border-soft);
    font-size: 12.5px;
  }
  .storage-row:first-child { border-top: 0; }
  .storage-row .sw { width: 10px; height: 10px; border-radius: 3px; }
  .storage-row .name { color: var(--ink-2); font-weight: 500; }
  .storage-row .files { color: var(--muted); font-size: 11.5px; font-family: 'JetBrains Mono', monospace; }
  .storage-row .size { font-family: 'JetBrains Mono', monospace; font-weight: 500; min-width: 72px; text-align: right; }

  /* ---------- Sessions table ---------- */
  .table { width: 100%; border-collapse: collapse; }
  .table th {
    text-align: left; font-weight: 500; color: var(--muted);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0 10px 10px; border-bottom: 1px solid var(--border);
  }
  .table td {
    padding: 0 10px; height: var(--row-h);
    border-bottom: 1px solid var(--border-soft);
    font-size: 12.5px;
  }
  .table tr:last-child td { border-bottom: 0; }
  .table tr.clickable { cursor: pointer; }
  .table tr.clickable:hover td { background: var(--surface-2); }
  .table tr.selected td { background: var(--accent-soft); }
  .model-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px; border-radius: 4px;
    font-size: 11px; font-weight: 500;
    background: var(--surface-2); color: var(--ink-2);
    font-family: 'JetBrains Mono', monospace;
  }
  .model-tag .mdot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-2); }
  .model-tag.opus .mdot { background: #7355A8; }
  .model-tag.sonnet .mdot { background: var(--accent); }
  .model-tag.haiku .mdot { background: #4A8FB8; }

  .bar-cell {
    display: flex; align-items: center; gap: 8px;
  }
  .bar-cell .bar {
    flex: 1; height: 4px; border-radius: 2px; background: var(--surface-2);
    overflow: hidden; min-width: 50px; max-width: 120px;
  }
  .bar-cell .bar > div { height: 100%; background: var(--ink); border-radius: 2px; }
  .bar-cell .num { font-family: 'JetBrains Mono', monospace; font-size: 12px; min-width: 54px; text-align: right; }

  .cell-muted { color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; }

  /* ---------- Drawer ---------- */
  .drawer-overlay {
    position: fixed; inset: 0; background: rgba(10,10,10,0.18);
    opacity: 0; pointer-events: none; transition: opacity 160ms ease;
    z-index: 40;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 480px;
    background: var(--surface); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform 220ms cubic-bezier(.3,.7,.2,1);
    z-index: 41; display: flex; flex-direction: column;
    box-shadow: -10px 0 40px rgba(10,10,10,0.06);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 18px 22px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .drawer-head .close {
    margin-left: auto; width: 28px; height: 28px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    display: grid; place-items: center; cursor: pointer; color: var(--muted);
  }
  .drawer-head .close:hover { background: var(--surface-2); color: var(--ink); }
  .drawer-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .drawer-sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 20px; }
  .drawer-section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); font-weight: 600; margin-bottom: 10px;
  }
  .kv-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border-soft); border: 1px solid var(--border-soft);
    border-radius: 8px; overflow: hidden;
  }
  .kv-cell { background: var(--surface); padding: 12px 14px; }
  .kv-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; font-weight: 600; }
  .kv-value { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; color: var(--ink); }
  .file-row {
    display: grid; grid-template-columns: 16px 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 10px; border-radius: 6px;
  }
  .file-row:hover { background: var(--surface-2); }
  .file-row .ic { width: 14px; height: 14px; color: var(--muted); }
  .file-row .path { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row .sz { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--muted); }

  .tokens-mini {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .tokens-mini .t {
    background: var(--surface-2); border-radius: 8px; padding: 12px 14px;
  }
  .tokens-mini .t .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .tokens-mini .t .v { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 500; margin-top: 4px; }
  .tokens-mini .t .b { height: 3px; background: #fff; border-radius: 2px; margin-top: 10px; overflow: hidden; }
  .tokens-mini .t .b > div { height: 100%; background: var(--ink); }

  /* ---------- Tweaks panel ---------- */
  .tweaks {
    position: fixed; right: 20px; bottom: 20px; width: 280px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; box-shadow: 0 12px 40px rgba(10,10,10,0.08);
    padding: 14px; z-index: 50;
    display: none;
  }
  .tweaks.open { display: block; }
  .tweaks-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .tweaks-title { font-size: 12px; font-weight: 600; letter-spacing: -0.005em; }
  .tweaks-close {
    width: 22px; height: 22px; border-radius: 5px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; color: var(--muted);
    display: grid; place-items: center;
  }
  .tweak-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 8px; }
  .tweak-group { margin-bottom: 14px; }
  .tweak-group:last-child { margin-bottom: 0; }
  .swatches { display: flex; gap: 8px; }
  .swatch {
    width: 26px; height: 26px; border-radius: 7px; border: 1px solid var(--border);
    cursor: pointer; position: relative;
  }
  .swatch.on { box-shadow: 0 0 0 2px var(--surface), 0 0 0 3px var(--ink); }
  .density-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; background: var(--surface-2); border-radius: 7px; padding: 3px; }
  .density-row button { height: 26px; border: 0; background: transparent; font: 500 11.5px 'Inter'; color: var(--muted); border-radius: 5px; cursor: pointer; text-transform: capitalize; }
  .density-row button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }

  /* ---------- Tooltips on chart ---------- */
  .chart-tip {
    position: absolute; pointer-events: none;
    background: var(--ink); color: #fff;
    padding: 6px 9px; border-radius: 6px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    transform: translate(-50%, -110%);
    white-space: nowrap; opacity: 0; transition: opacity 120ms;
  }
  .chart-tip.show { opacity: 1; }

  /* thin scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #E0E0DE; border-radius: 10px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  // Tweak defaults — wrapped in markers so the host can persist changes
  window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "density": "balanced",
    "accent": "#CC785C"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
